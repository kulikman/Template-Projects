version: 2
updates:
  # npm — keep dependencies patched. Especially important because of
  # CVE-2025-66478 (React2Shell) — see CLAUDE.md §"React 19 security note".
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Group minor + patch bumps — review one PR per group, not 15.
      next:
        patterns: ["next", "eslint-config-next", "@next/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "prettier-plugin-tailwindcss"]
      supabase:
        patterns: ["@supabase/*"]
      tooling:
        patterns:
          - "eslint*"
          - "prettier*"
          - "vitest*"
          - "typescript"
          - "husky"
          - "lint-staged"
    labels: ["dependencies"]
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions — keep CI on supported runners.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["ci"]
    commit-message:
      prefix: "chore(ci)"
