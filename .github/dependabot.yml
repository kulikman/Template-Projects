version: 2

updates:
  # npm / pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    # Group all non-major updates into a single PR to reduce noise.
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # Only open PRs for direct dependencies (skip transitive noise).
    allow:
      - dependency-type: "direct"
    # Auto-label for easy filtering.
    labels:
      - "dependencies"
    # Limit open PRs — major bumps still get individual PRs (up to 5).
    open-pull-requests-limit: 5
    # Commit message style — matches Conventional Commits / commitlint setup.
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
