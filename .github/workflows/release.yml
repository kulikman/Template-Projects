name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    # Only run when CI passes — don't create a release PR from a broken build.
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Reads version from package.json and Conventional Commits history.
          release-type: node

      # After a release PR is merged and a GitHub Release is created,
      # optionally trigger a production deploy here.
      # - name: Deploy to production
      #   if: ${{ steps.release.outputs.release_created }}
      #   run: echo "Deploying version ${{ steps.release.outputs.tag_name }}"
