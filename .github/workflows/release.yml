name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    # Only run when CI passes — don't create a release PR from a broken build.
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # Manifest mode: release-please reads config + version state from
          # files instead of scanning full git history (avoids GraphQL timeout).
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          # Option A (default): enable "Allow GitHub Actions to create and
          # approve pull requests" in Settings → Actions → General.
          #
          # Option B: create a PAT with `repo` scope, store as secret
          # RELEASE_PLEASE_TOKEN, and uncomment the next line:
          # token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      # After a release PR is merged and a GitHub Release is created,
      # optionally trigger a production deploy here.
      # - name: Deploy to production
      #   if: ${{ steps.release.outputs.release_created }}
      #   run: echo "Deploying version ${{ steps.release.outputs.tag_name }}"
