name: Agent Policy Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without pushing sync branches or opening PRs.
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  sync:
    name: Sync policy bundle by pull request
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6

      - name: Print dry-run sync plan
        if: ${{ inputs.dry_run == true }}
        run: node scripts/agent-policy-sync-dry-run.mjs

      - name: Require PAT for write sync
        if: ${{ inputs.dry_run == false }}
        run: |
          echo "Write sync is intentionally disabled until the PR engine is implemented." >&2
          echo "GH_PAT will be required before enabling dry_run=false." >&2
          exit 1
